{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Platillo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'estilos.css' %}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'inicio' %}">📦 JCasas App</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'inicio' %}">Inicio</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6"> <div class="card-personalizada p-4 shadow-sm">
                    <h2 class="mb-4" style="color: #78350f;">Añadir Platillo al Sistema</h2>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            {{ form.nombre }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripcion</label>
                            {{ form.descripcion }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Unidad medida</label>
                            {{ form.unidad_medida }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            {{ form.precio }}
                        </div>
                        <div class="mb-3 form-check">
                            {{ form.estado }}
                            <label class="form-check-label">Estado</label>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-calido">💾 Guardar Platillo</button>
                            <a href="{% url 'ver_productos' %}" class="btn btn-outline-danger">❌ Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
