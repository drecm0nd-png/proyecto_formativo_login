{% load static %} <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto Guardado</title>
    <link rel="stylesheet" href="{% static 'estilos.css' %}">
</head>
<body class="bg-light text-center">

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'inicio' %}">📦 JCasas App</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'inicio' %}">Inicio</a>
                <a class="nav-link" href="{% url 'registrar_producto' %}">Registrar Producto</a>
                <a class="nav-link" href="{% url 'ver_productos' %}">Ver Inventario</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 550px;">
        <div class="card-personalizada text-center p-5">
            <div class="mb-3" style="font-size: 3.5rem;">✅</div>
            <h2 class="fw-bold mb-3" style="color: #78350f;">¡Ingresado con Éxito!</h2>
            <p class="fs-5 text-muted mb-4">
                El producto <strong>{{ producto.nombre }}</strong> ha sido registrado correctamente en la base de datos.
            </p>
            <hr class="my-4" style="border-color: #fcd34d;">
            
            <div class="d-grid gap-3">
                <a href="{% url 'registrar_producto' %}" class="btn-calido">
                    ➕ Registrar otro producto
                </a>
                <a href="{% url 'inicio' %}" class="btn-calido" style="background-color: #78350f !important;">
                    🏠 Volver al Inicio
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
