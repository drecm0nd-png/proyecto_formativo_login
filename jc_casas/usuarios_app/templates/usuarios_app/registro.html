{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse - JCasas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="{% static 'estilos.css' %}" />
  </head>
  <body class="fade-in">
    <div class="container-fluid p-0 position-relative">
      <a href="{% url 'inicio' %}" class="btn-volver-inicio">
        <i class="bi bi-arrow-left fs-5"></i> Volver al inicio
      </a>

      <div class="row g-0 pantalla-dividida" style="min-height: 100vh">
        <div class="col-12 col-lg-6 seccion-formulario d-flex align-items-center justify-content-center py-5">
          <div class="contenedor-login text-center" style="max-width: 400px; width: 100%; padding: 0 20px">
            
            <div class="mb-3 d-flex justify-content-center">
              <img src="{% static 'imagenes/logo.png' %}" alt="JCasas Logo" class="logo-estilo" />
            </div>

            <h2 class="fw-bold mb-1 titulo-color">Crea tu cuenta</h2>

            <p class="text-muted small mb-4">Regístrate para disfrutar de la mejor experiencia</p>

            <div class="conmutador-login d-flex justify-content-between mb-4">
              <a href="{% url 'inicio_sesion' %}" class="btn btn-conmutar text-muted w-50 text-decoration-none text-center">Iniciar sesión</a>
              <a href="#" class="btn btn-conmutar activo w-50 text-decoration-none text-center">Registrarse</a>
            </div>

            <form method="POST" action="{% url 'registro' %}">
              {% csrf_token %}

              <div class="text-start mb-3">
                <label class="form-label small fw-bold label-color">Nombre completo</label>
                <div class="input-group input-login-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input type="text" name="first_name" class="form-control" placeholder="Carlos Gómez" required />
                </div>
              </div>

              <div class="text-start mb-3">
                <label class="form-label small fw-bold label-color">Correo electrónico</label>
                <div class="input-group input-login-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" name="email" class="form-control" placeholder="carlos@ejemplo.com" required />
                </div>
              </div>

              <div class="text-start mb-3">
                <label class="form-label small fw-bold label-color">Número de teléfono</label>
                <div class="input-group input-login-group">
                  <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                  <input type="text" name="numero" class="form-control" placeholder="3001234567" required />
                </div>
              </div>

              <div class="text-start mb-3">
                <label class="form-label small fw-bold label-color">Contraseña</label>
                <div class="input-group input-login-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" name="password" id="inputPassword" class="form-control" placeholder="••••••••" required />
                  <button type="button" class="input-group-text pe-3 text-muted" onclick="togglePasswordVisibility('inputPassword', 'toggleIcon')">
                    <i class="bi bi-eye-slash" id="toggleIcon"></i>
                  </button>
                </div>
              </div>

              <div class="text-start mb-4">
                <label class="form-label small fw-bold label-color">Confirmar contraseña</label>
                <div class="input-group input-login-group">
                  <span class="input-group-text"><i class="bi bi-lock-check"></i></span>
                  <input type="password" name="password_confirm" id="inputPasswordConfirm" class="form-control" placeholder="••••••••" required />
                  <button type="button" class="input-group-text pe-3 text-muted" onclick="togglePasswordVisibility('inputPasswordConfirm', 'toggleIconConfirm')">
                    <i class="bi bi-eye-slash" id="toggleIconConfirm"></i>
                  </button>
                </div>
              </div>

              <button type="submit" class="btn btn-calido btn-login-submit w-100 py-2.5 mb-4">Registrarse</button>
              
              <div class="text-center mt-2">
                <p class="small text-muted">
                    Al registrarte, aceptas nuestros 
                    <a href="#" class="text-decoration-none fw-bold link-terminos">términos y condiciones</a>.
                </p>
              </div>
            </form>
          </div>
        </div>

        <div class="col-lg-6 d-none d-lg-block p-0">
          <img src="{% static 'imagenes/restaurante.jpg' %}" alt="Ambiente JCasas" class="seccion-imagen-contenedor" onerror="this.onerror = null; this.src = 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200';" />
        </div>
      </div>
    </div>

    <script>
      function togglePasswordVisibility(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const toggleIcon = document.getElementById(iconId);
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.classList.remove("bi-eye-slash");
          toggleIcon.classList.add("bi-eye");
        } else {
          passwordInput.type = "password";
          toggleIcon.classList.remove("bi-eye");
          toggleIcon.classList.add("bi-eye-slash");
        }
      }
    </script>
  </body>
</html>
