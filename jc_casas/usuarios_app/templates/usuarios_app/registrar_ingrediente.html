{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Nuevo Ingrediente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'estilos.css' %}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{% url 'inicio' %}">📦 JCasas App</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'inicio' %}">Inicio</a>
                <a class="nav-link" href="{% url 'ver_ingredientes' %}">Ver Almacén</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card-personalizada p-4">
            <h2 class="text-center mb-4" style="color: #78350f;">🌾 Registrar Nueva Materia Prima</h2>
            <hr style="border-color: #fcd34d;">

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre del Ingrediente:</label>
                    {{ form.nombre }}
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Cantidad / Stock Inicial en Bodega:</label>
                    {{ form.cantidad }}
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn-calido">💾 Registrar en Base de Datos</button>
                    <a href="{% url 'inicio' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
