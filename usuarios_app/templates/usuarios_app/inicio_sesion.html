{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - JCasas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'estilos.css' %}">
    <style>
        .seccion-imagen-contenedor { width: 100%; height: 100vh; object-fit: cover; }
        
        /* Efecto de desvanecimiento */
        .fade-in {
            animation: fadeInAnimation 1s ease-in;
        }
        @keyframes fadeInAnimation {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="fade-in"> <div class="container-fluid p-0 position-relative">
        
        <a href="{% url 'inicio' %}" class="text-decoration-none small fw-bold d-inline-flex align-items-center gap-2 position-absolute" style="top: 20px; left: 20px; color: #3e3221; opacity: 0.7; transition: all 0.2s; z-index: 10;" onmouseover="this.style.opacity='1'; this.style.transform='translateX(-3px)';" onmouseout="this.style.opacity='0.7'; this.style.transform='translateX(0)';">
            <i class="bi bi-arrow-left fs-5"></i> Volver al inicio
        </a>

        <div class="row g-0 pantalla-dividida" style="min-height: 100vh;">
            
            <div class="col-12 col-lg-6 seccion-formulario d-flex align-items-center justify-content-center py-5">
                <div class="contenedor-login text-center" style="max-width: 400px; width: 100%; padding: 0 20px;">
                    
                    <div class="mb-3 d-flex justify-content-center">
                        <img src="{% static 'imagenes/logo.png' %}" alt="JCasas Logo" class="img-fluid rounded-circle border shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">
                    </div>
                    
                    <h2 class="fw-bold mb-1" style="color: #3e3221;">JCasas</h2>
                        {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-danger p-2 small mb-3">{{ message }}</div>
                        {% endfor %}
                        {% endif %}
                    <p class="text-muted small mb-4">Ingresa para pedir tus platos favoritos</p>

                    <div class="conmutador-login d-flex justify-content-between mb-4">
                        <a href="#" class="btn btn-conmutar activo w-50 text-decoration-none text-center">Iniciar sesión</a>
                        <a href="{% url 'registro' %}" class="btn btn-conmutar text-muted w-50 text-decoration-none text-center">Registrarse</a>
                    </div>
                    
                    <form method="POST" action="{% url 'inicio_sesion' %}">
                        {% csrf_token %}
                        
                        <div class="text-start mb-3">
                            <label class="form-label small fw-bold" style="color: #3e3221;">Correo electrónico</label>
                            <div class="input-group input-login-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="username" class="form-control" placeholder="carlos@ejemplo.com" required>
                            </div>
                        </div>
                        
                        <div class="text-start mb-2">
                            <label class="form-label small fw-bold" style="color: #3e3221;">Contraseña</label>
                            <div class="input-group input-login-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" id="inputPassword" class="form-control" placeholder="••••••••" required>
                                <button type="button" class="input-group-text pe-3 text-muted" onclick="togglePasswordVisibility()">
                                    <i class="bi bi-eye-slash" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="text-end mb-4">
                            <a href="{% url 'restablecer_contrasena' %}" class="enlace-olvido">¿Olvidaste tu contraseña?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-calido btn-login-submit w-100 py-2.5 mb-4">Ingresar</button>
                    </form>
                </div>
            </div>
            
            <div class="col-lg-6 d-none d-lg-block p-0">
                <img src="{% static 'imagenes/restaurante.jpg' %}" alt="Ambiente JCasas" class="seccion-imagen-contenedor" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200';">
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('inputPassword');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
